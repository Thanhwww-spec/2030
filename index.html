<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ĐỒNG HỒ ĐIỆN ONLINE</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0f172a;
    font-family:Arial;
    color:white;
    text-align:center;
}

/*========== HEADER ==========*/

.header{

    background:
    linear-gradient(
    145deg,
    #111827,
    #1e293b);

    padding:20px;

    font-size:24px;

    font-weight:bold;

    box-shadow:
    0 5px 20px rgba(0,0,0,0.5);
}

/*========== CONTAINER ==========*/

.container{

    display:grid;

    grid-template-columns:
    repeat(2,1fr);

    gap:12px;

    padding:12px;
}

/*========== CARD ==========*/

.box{

    background:
    linear-gradient(
    145deg,
    #1e293b,
    #0f172a);

    border-radius:20px;

    padding:20px;

    box-shadow:
    0 6px 20px rgba(0,0,0,0.45);

    border:
    1px solid rgba(255,255,255,0.05);

    transition:0.3s;
}

.box:hover{
    transform:
    translateY(-3px);
}

/*========== TITLE ==========*/

.title{

    font-size:16px;

    color:#94a3b8;

    margin-bottom:12px;
}

/*========== VALUE ==========*/

.value{

    font-size:28px;

    font-weight:bold;

    color:white;

    text-shadow:
    0 0 10px rgba(255,255,255,0.15);
}

/*========== MONEY CARD ==========*/

.money{

    background:
    linear-gradient(
    145deg,
    #16a34a,
    #15803d);
}

/*========== TIME CARD ==========*/

.runtime{

    background:
    linear-gradient(
    145deg,
    #2563eb,
    #1d4ed8);
}

/*========== RESET BUTTON ==========*/

.resetBox{

    margin-top:20px;
}

.resetBtn{

    border:none;

    background:
    linear-gradient(
    145deg,
    #dc2626,
    #ef4444);

    color:white;

    padding:18px 30px;

    border-radius:18px;

    font-size:18px;

    font-weight:bold;

    box-shadow:
    0 5px 20px rgba(255,0,0,0.35);

    transition:0.3s;
}

.resetBtn:hover{

    transform:
    scale(1.05);
}

/*========== FOOTER ==========*/

.footer{

    margin:20px;

    color:#64748b;

    font-size:14px;
}

/*========== MOBILE ==========*/

@media(max-width:600px){

    .value{
        font-size:24px;
    }

    .title{
        font-size:14px;
    }

    .header{
        font-size:20px;
    }
}

</style>

</head>

<body>

<!--========== HEADER ==========-->

<div class="header">
⚡ ĐỒNG HỒ ĐIỆN ONLINE
</div>

<!--========== CARDS ==========-->

<div class="container">

<div class="box">
<div class="title">Điện áp</div>
<div class="value" id="voltage">0 V</div>
</div>

<div class="box">
<div class="title">Dòng điện</div>
<div class="value" id="current">0 A</div>
</div>

<div class="box">
<div class="title">Công suất</div>
<div class="value" id="power">0 W</div>
</div>

<div class="box">
<div class="title">Điện năng</div>
<div class="value" id="energy">0 kWh</div>
</div>

<div class="box money">
<div class="title">Tiền điện</div>
<div class="value" id="money">0 đ</div>
</div>

<div class="box runtime">
<div class="title">Thời gian</div>
<div class="value" id="runtime">
0 giờ
</div>
</div>

</div>

<!--========== RESET BUTTON ==========-->

<div class="resetBox">

<button
class="resetBtn"
onclick="resetEnergy()">

RESET ĐIỆN NĂNG

</button>

</div>

<!--========== FOOTER ==========-->

<div class="footer">
Firebase Realtime Monitor
</div>

<script>

//========== FIREBASE URL ==========

const firebaseURL =
"https://mayvl-bf237-default-rtdb.asia-southeast1.firebasedatabase.app/PZEM.json";

//========== LOAD DATA ==========

async function loadData()
{
    try{

        const response =
        await fetch(firebaseURL);

        const data =
        await response.json();

        // Điện áp
        document.getElementById("voltage").innerHTML =
        data.Voltage + " V";

        // Dòng điện
        document.getElementById("current").innerHTML =
        data.Current + " A";

        // Công suất
        document.getElementById("power").innerHTML =
        data.Power + " W";

        // Điện năng
        document.getElementById("energy").innerHTML =
        data.Energy + " kWh";

        // Tiền điện
        document.getElementById("money").innerHTML =
        parseInt(data.Money)
        .toLocaleString()
        + " đ";

        // Thời gian
        if(data.RunHours != undefined)
        {
            document.getElementById("runtime")
            .innerHTML =

            data.RunHours +
            " giờ " +

            data.RunMinutes +
            " phút";
        }

    }
    catch(error)
    {
        console.log(error);
    }
}

//========== RESET ENERGY ==========

async function resetEnergy()
{
    let password =
    prompt("Nhập mật khẩu reset:");

    // đổi mật khẩu ở đây
    if(password !== "8888")
    {
        alert("Sai mật khẩu");
        return;
    }

    await fetch(
    "https://mayvl-bf237-default-rtdb.asia-southeast1.firebasedatabase.app/PZEM/Reset.json",
    {
        method:"PUT",
        body:"1"
    });

    alert("Đã reset điện năng");
}

//========== AUTO UPDATE ==========

loadData();

setInterval(loadData, 3000);

</script>

</body>
</html>
